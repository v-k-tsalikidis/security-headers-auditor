name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out release source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Activate pinned pnpm through Corepack
        id: pnpm
        shell: bash
        run: |
          corepack enable pnpm
          corepack install --global pnpm@11.9.0
          test "$(pnpm --version)" = "11.9.0"
          echo "store_path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ steps.pnpm.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install and verify frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build

      - name: Verify packaged workspace assets are current
        run: git diff --exit-code -- src/security_headers_auditor/workspace_static

      - name: Set up audited Python build toolchain
        run: >-
          python -m pip install --upgrade
          pip==26.1.2 setuptools==83.0.0 build==1.5.0 packaging==26.2

      - name: Install and test Python package
        run: |
          python -m pip install -e ".[test]"
          python -m unittest discover -s tests -v

      - name: Build release distributions
        run: python -m build --wheel --sdist --no-isolation

      - name: Verify wheel contents and local installation
        run: |
          python -c "from pathlib import Path; from zipfile import ZipFile; wheel = next(Path('dist').glob('*.whl')); names = ZipFile(wheel).namelist(); assert any(name.endswith('workspace_static/index.html') for name in names); assert any(name.endswith('licenses/THIRD_PARTY_NOTICES.md') for name in names); assert not any(Path(name).name == '.DS_Store' for name in names)"
          python -m venv /tmp/security-headers-auditor-release-check
          /tmp/security-headers-auditor-release-check/bin/pip install --no-index --no-deps dist/*.whl
          /tmp/security-headers-auditor-release-check/bin/security-headers-auditor --help

      - name: Generate release checksums
        working-directory: dist
        run: sha256sum *.whl *.tar.gz > SHA256SUMS

      - name: Upload release distributions
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: security-headers-auditor-dist-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

      - name: Attest release distributions
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: dist/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out tagged release notes
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download attested distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: security-headers-auditor-dist-${{ github.sha }}
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" dist/*
          --verify-tag
          --title "${GITHUB_REF_NAME}"
          --notes-file "docs/releases/${GITHUB_REF_NAME}.md"
