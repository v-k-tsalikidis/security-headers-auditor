name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install and verify frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build

      - name: Verify packaged workspace assets are current
        run: git diff --exit-code -- src/security_headers_auditor/workspace_static

      - name: Set up audited Python build toolchain
        run: >-
          python -m pip install --upgrade
          pip==26.1.2 setuptools==83.0.0 build==1.5.0

      - name: Install and test Python package
        run: |
          python -m pip install -e ".[test]"
          python -m unittest discover -s tests -v

      - name: Build release distributions
        run: python -m build --wheel --sdist --no-isolation

      - name: Verify wheel contents and local installation
        run: |
          python -c "from pathlib import Path; from zipfile import ZipFile; wheel = next(Path('dist').glob('*.whl')); names = ZipFile(wheel).namelist(); assert any(name.endswith('workspace_static/index.html') for name in names); assert any(name.endswith('licenses/THIRD_PARTY_NOTICES.md') for name in names); assert not any(Path(name).name == '.DS_Store' for name in names)"
          python -m venv /tmp/security-headers-auditor-release-check
          /tmp/security-headers-auditor-release-check/bin/pip install --no-index --no-deps dist/*.whl
          /tmp/security-headers-auditor-release-check/bin/security-headers-auditor --help

      - name: Generate release checksums
        run: sha256sum dist/* > dist/SHA256SUMS

      - name: Upload release distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-headers-auditor-dist-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

      - name: Attest release distributions
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: dist/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out tagged release notes
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download attested distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: security-headers-auditor-dist-${{ github.sha }}
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" dist/*
          --verify-tag
          --title "${GITHUB_REF_NAME}"
          --notes-file "docs/releases/${GITHUB_REF_NAME}.md"
