name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pinned packaging toolchain
        run: python -m pip install --upgrade pip==26.1.2

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Compile source and tests
        run: python -m compileall -q src tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Exercise deterministic assurance outputs
        shell: bash
        run: |
          python tests/fixture_server.py --port 8765 > fixture-server.log 2>&1 &
          FIXTURE_PID=$!
          trap 'kill "$FIXTURE_PID"' EXIT
          curl \
            --fail \
            --retry 10 \
            --retry-connrefused \
            --retry-delay 1 \
            --silent \
            --show-error \
            http://127.0.0.1:8765/assurance-ready > /dev/null
          security-headers-auditor \
            --policy examples/ci-fixture-policy.json \
            --baseline examples/ci-fixture-baseline.json \
            --write-baseline build/assurance-candidate-baseline.json \
            --format json \
            --output build/assurance.json
          cmp \
            --silent \
            examples/ci-fixture-baseline.json \
            build/assurance-candidate-baseline.json
          security-headers-auditor \
            --policy examples/ci-fixture-policy.json \
            --baseline examples/ci-fixture-baseline.json \
            --format sarif \
            --output build/assurance.sarif
          security-headers-auditor \
            --policy examples/ci-fixture-policy.json \
            --baseline examples/ci-fixture-baseline.json \
            --format junit \
            --output build/assurance.junit.xml

      - name: Upload assurance artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: assurance-python-${{ matrix.python-version }}
          path: |
            build/assurance.json
            build/assurance.sarif
            build/assurance.junit.xml
            build/assurance-candidate-baseline.json
          if-no-files-found: error

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Test frontend
        working-directory: frontend
        run: pnpm test

      - name: Build packaged workspace assets
        working-directory: frontend
        run: pnpm build

      - name: Verify committed assets are current
        run: git diff --exit-code -- src/security_headers_auditor/workspace_static
